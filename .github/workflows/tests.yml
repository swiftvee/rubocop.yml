name: tests
on:
  - push
jobs:
  rspec:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
      - run: gem install rspec --no-document
      - run: gem install rubocop --no-document
      - run: rspec
